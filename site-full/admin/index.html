<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>ניהול אתר — סלבה צ'פלין</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0d1b35;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Heebo',Arial,sans-serif}
    .loader{text-align:center;color:#c8a96e}
    .spinner{width:44px;height:44px;border:3px solid rgba(200,169,110,.2);border-top-color:#c8a96e;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
    @keyframes spin{to{transform:rotate(360deg)}}
    h2{font-size:18px;font-weight:700;margin-bottom:6px}
    p{font-size:12px;color:rgba(200,169,110,.5)}
  </style>
</head>
<body>
  <div class="loader">
    <div class="spinner"></div>
    <h2>מערכת ניהול</h2>
    <p>סלבה צ'פלין נדל"ן</p>
  </div>
  <script src="https://unpkg.com/netlify-cms@^2.0.0/dist/netlify-cms.js"></script>
</body>
</html>
